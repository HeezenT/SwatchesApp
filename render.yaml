services:
  - type: web
    name: deryan-variant-swatches-staging
    runtime: docker
    plan: free
    region: frankfurt
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SCOPES
        value: read_products,write_products
      - key: DATABASE_URL
        fromDatabase:
          name: deryan-variant-swatches-db
          property: connectionString

databases:
  - name: deryan-variant-swatches-db
    databaseName: deryan_variant_swatches
    user: deryan_swatches
    plan: free
    region: frankfurt
